<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mars Trail · Mission Control</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/modals.css">
  <link rel="stylesheet" href="styles/theme-lcars.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <header class="topbar">
    <span class="brand">MARS TRAIL · MISSION CTRL</span>
    <span class="topbar-right">
      <span class="clock" id="clock">SOL 1 · 00:00 LMST</span>
      <button id="theme-toggle-btn" class="theme-toggle" type="button">TNG SKIN</button>
    </span>
  </header>

  <main class="dashboard">

    <section class="panel panel-route" aria-label="Route">
      <h2 class="panel-title">ROUTE</h2>
      <svg class="minimap" viewBox="0 0 200 100" aria-hidden="true">
        <rect x="0" y="0" width="200" height="100" fill="#001a0a" stroke="#0a8" stroke-width="0.5"/>
        <!-- base route: dashed, represents unvisited path -->
        <path id="minimap-path" d="M20,78 Q60,34 92,58 T160,42 L184,26" fill="none" stroke="#0a8" stroke-width="0.8" stroke-dasharray="2,2"/>
        <!-- trail: overlaid solid stroke showing traveled distance -->
        <path id="minimap-trail" d="M20,78 Q60,34 92,58 T160,42 L184,26" fill="none" stroke="#0f0" stroke-width="1.6" stroke-dasharray="0 9999" stroke-linecap="round"/>
        <!-- landmark dots (rendered from state) -->
        <g id="minimap-landmarks"></g>
        <!-- rover "you are here" marker -->
        <circle id="minimap-position" cx="20" cy="78" r="3" fill="#fbbf24" stroke="#000" stroke-width="0.6"/>
      </svg>
      <ol class="landmarks" id="landmark-list"></ol>
    </section>

    <section class="panel panel-telemetry" aria-label="Telemetry">
      <h2 class="panel-title">TELEMETRY</h2>
      <ul class="readouts" id="readouts"></ul>
    </section>

    <section class="panel panel-crew" aria-label="Crew">
      <h2 class="panel-title">CREW</h2>
      <ul class="crew-list" id="crew-list"></ul>

      <div class="controls">
        <div class="control-group">
          <span class="control-label">PACE</span>
          <div class="seg" id="pace-seg" role="radiogroup" aria-label="Pace"></div>
        </div>
        <div class="control-group">
          <span class="control-label">RATIONS</span>
          <div class="seg" id="rations-seg" role="radiogroup" aria-label="Rations"></div>
        </div>
      </div>
    </section>

    <section class="panel panel-log" aria-label="Mission Log">
      <h2 class="panel-title">MISSION LOG</h2>
      <ul class="log" id="log" aria-live="polite"></ul>
    </section>

    <footer class="actionbar">
      <button class="btn-secondary" id="clean-btn" title="Scrub solar panels: PANELS to 100%, -1 EVA, costs a sol">
        CLEAN (-1 EVA, PANELS 100%)
      </button>
      <button class="btn-secondary" id="repair-btn" title="Install a fresh power cell: +25% PWR, -1 CELL, costs a sol">
        REPAIR (-1 CELL, +25% PWR)
      </button>
      <button class="btn-primary" id="next-sol-btn">NEXT SOL →</button>
    </footer>

  </main>

  <div id="modal-root"></div>

  <script type="module" src="src/theme.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
